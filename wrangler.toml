name = "text-your-notion"
main = "src/worker.py"
compatibility_date = "2024-01-01"
compatibility_flags = ["python_workers"]

[ai]
binding = "AI"

[triggers]
# 9 AM PST = 16:00 UTC (PST is UTC-8)
# Note: During PDT (daylight saving), 9 AM PDT = 16:00 UTC (PDT is UTC-7)
crons = ["0 16 * * *"]

# Environment variables (set via: wrangler secret put <KEY>)
# TELEGRAM_BOT_TOKEN
# TELEGRAM_CHAT_ID
# GOOGLE_CALENDAR_ACCESS_TOKEN
# GOOGLE_CALENDAR_REFRESH_TOKEN
# GOOGLE_CALENDAR_CLIENT_ID
# GOOGLE_CALENDAR_CLIENT_SECRET
# NOTION_API_KEY
# NOTION_DATABASE_ID
