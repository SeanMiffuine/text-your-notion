name = "notion-assistant-bot"
main = "src/worker.py"
compatibility_date = "2024-01-01"

[ai]
binding = "AI"

[triggers]
# 9 AM PST = 16:00 UTC (PST is UTC-8)
# Note: During PDT (daylight saving), 9 AM PDT = 16:00 UTC (PDT is UTC-7)
crons = ["0 16 * * *"]

# Environment variables (set via: wrangler secret put <KEY>)
# TELEGRAM_BOT_TOKEN
# GOOGLE_CALENDAR_OAUTH_TOKEN
# NOTION_API_KEY
# NOTION_DATABASE_ID
# TELEGRAM_CHAT_ID
